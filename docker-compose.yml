services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uniapp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uniapp
      POSTGRES_PASSWORD: uniapp_dev
      POSTGRES_DB: uniapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uniapp-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: uniapp-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--js --sd /data --http_port 8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  nats_data:
