apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uniapp-api-hpa
  namespace: uniapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uniapp-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uniapp-web-hpa
  namespace: uniapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uniapp-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
