# Secrets are managed via external-secrets or kubectl create secret
# DO NOT commit actual secrets to this file
# Create secrets with:
#   kubectl create secret generic uniapp-secrets \
#     --from-literal=database-url="postgresql://..." \
#     --from-literal=redis-url="redis://..." \
#     --from-literal=jwt-secret="..." \
#     --from-literal=anthropic-api-key="sk-ant-..." \
#     -n uniapp
apiVersion: v1
kind: Secret
metadata:
  name: uniapp-secrets
  namespace: uniapp
type: Opaque
# data: managed externally
